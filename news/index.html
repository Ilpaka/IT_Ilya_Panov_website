<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новостная лента</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>Новостная лента</h1>
        <p>Простая работа со всеми методами новостной ленты.</p>

        <div class="panel">
            <h2>Информация</h2>
            <p>Количество новостей: <span id="news-count">0</span></p>
            <button id="show-all-button">Показать все новости</button>
            <button id="sort-button">Сортировать по дате</button>
        </div>

        <div class="panel">
            <h2>Добавить новость</h2>
            <input type="text" id="title-input" placeholder="Заголовок">
            <textarea id="text-input" placeholder="Текст новости"></textarea>
            <input type="date" id="date-input">
            <input type="text" id="tags-input" placeholder="Теги через запятую">
            <button id="add-button">Добавить новость</button>
        </div>

        <div class="panel">
            <h2>Удалить новость</h2>
            <input type="number" id="delete-id-input" placeholder="Введите id">
            <button id="delete-button">Удалить по id</button>
        </div>

        <div class="panel">
            <h2>Поиск по тегу</h2>
            <input type="text" id="tag-search-input" placeholder="Введите тег">
            <button id="search-button">Найти</button>
            <button id="reset-button">Сбросить фильтр</button>
        </div>

        <p id="message"></p>

        <h2>Список новостей</h2>
        <div id="news-list"></div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
