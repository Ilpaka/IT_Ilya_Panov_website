<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Окружность</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f3f3f3;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .block {
            background-color: white;
            border: 1px solid #cccccc;
            padding: 15px;
            margin-bottom: 20px;
        }

        input,
        button {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .circle-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 360px;
        }

        #circle-view {
            width: 120px;
            height: 120px;
            border: 3px solid #2f5aa8;
            border-radius: 50%;
            background-color: #dfeaff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        #circle-text {
            font-size: 14px;
            line-height: 1.4;
        }

        p {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Класс окружности</h1>

        <div class="block">
            <h2>Введите радиус</h2>
            <input type="number" id="radius-input" placeholder="Введите радиус" value="15">
            <button id="create-button">Показать параметры окружности</button>
            <p id="message"></p>
        </div>

        <div class="block">
            <h2>Параметры окружности</h2>
            <p>Радиус: <span id="radius-output">0</span></p>
            <p>Диаметр: <span id="diameter-output">0</span></p>
            <p>Площадь: <span id="area-output">0</span></p>
            <p>Длина окружности: <span id="length-output">0</span></p>
        </div>

        <div class="block">
            <h2>Отрисовка окружности</h2>
            <div class="circle-wrap">
                <div id="circle-view">
                    <div id="circle-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="./circleClass.js"></script>
</body>
</html>
